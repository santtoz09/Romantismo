<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sobreviva ao Mal do Século</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="rain"></div>
  <main class="app-shell">
    <section class="screen active" id="start-screen">
      <p class="kicker">🎭 Jogo literário</p>
      <h1>Sobreviva ao Mal do Século</h1>
      <p class="subtitle">Teste seus conhecimentos sobre o ultrarromantismo brasileiro</p>
      <div class="intro-card">
        <p>🌙 Entre chuva, lua e poesia, responda perguntas rápidas sobre:</p>
        <ul>
          <li><strong>Álvares de Azevedo</strong></li>
          <li><strong>Casimiro de Abreu</strong></li>
          <li><strong>Fagundes Varela</strong></li>
        </ul>
      </div>
      <button id="start-btn" class="btn primary">Começar quiz</button>
      <button id="sound-btn" class="btn ghost" aria-pressed="false">🔉 Efeitos sonoros: desligados</button>
    </section>

    <section class="screen" id="quiz-screen">
      <header class="quiz-header">
        <div>
          <p class="progress-label">Pergunta <span id="current-question">1</span>/<span id="total-questions">11</span></p>
          <div class="progress-bar"><span id="progress-fill"></span></div>
        </div>
        <p class="score">Pontuação: <span id="score">0</span></p>
      </header>

      <article class="question-card" id="question-card"></article>
      <div class="actions">
        <button id="next-btn" class="btn primary" disabled>Próxima</button>
      </div>
    </section>

    <section class="screen" id="result-screen">
      <h2>Resultado final</h2>
      <p id="result-points" class="result-points"></p>
      <p id="result-message" class="result-message"></p>
      <div class="result-badges" id="result-badges"></div>
      <button id="restart-btn" class="btn primary">Jogar novamente</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
